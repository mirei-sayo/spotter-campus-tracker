<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finder Dashboard | Spotter</title>
    <meta name="description" content="Log found items into the Spotter campus lost and found system.">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand text-gradient">Spotter</div>
            <div class="sidebar-role">Finder Dashboard</div>
            <ul class="sidebar-nav">
                <li><a href="#" class="active" data-section="log-item"><i class="material-icons-round">add_circle</i>Log Found Item</a></li>
                <li><a href="#" data-section="my-reports"><i class="material-icons-round">list_alt</i>My Reports</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">F</div>
                    <span class="user-name" id="user-name">Finder</span>
                </div>
                <button class="logout-btn" onclick="logout()"><i class="material-icons-round">logout</i>Sign Out</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Log Found Item Section -->
            <section id="section-log-item">
                <div class="page-header">
                    <h1>Log a Found Item</h1>
                    <p>Found something on campus? Log it here so the rightful owner can find it.</p>
                </div>

                <form class="report-form glass-card" id="found-item-form">
                    <div class="form-group">
                        <label class="form-label" for="found-title">Item Name *</label>
                        <input type="text" id="found-title" class="form-control" placeholder="e.g. Black iPhone 15" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="found-category">Category *</label>
                            <select id="found-category" class="form-control" required>
                                <option value="Electronics">Electronics</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Accessories">Accessories</option>
                                <option value="Documents">Documents</option>
                                <option value="Keys">Keys</option>
                                <option value="Bags">Bags</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="found-color">Color</label>
                            <input type="text" id="found-color" class="form-control" placeholder="e.g. Black">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="found-brand">Brand</label>
                            <input type="text" id="found-brand" class="form-control" placeholder="e.g. Apple">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="found-location">Where Found *</label>
                            <input type="text" id="found-location" class="form-control" placeholder="e.g. Cafeteria, Table 5" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="found-description">Description</label>
                        <textarea id="found-description" class="form-control" placeholder="Describe the item — condition, distinguishing marks, etc."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" id="submit-found-btn">
                        <i class="material-icons-round">inventory</i> Log Item
                    </button>
                </form>
            </section>

            <!-- My Reports Section -->
            <section id="section-my-reports" style="display:none;">
                <div class="page-header">
                    <h1>My Reports</h1>
                    <p>Items you've logged into the system.</p>
                </div>
                <div class="items-grid" id="my-reports-grid">
                    <div class="empty-state">
                        <i class="material-icons-round">hourglass_empty</i>
                        <h3>Loading...</h3>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="./js/api.js"></script>
    <script>
        // Auth guard
        if (!requireAuth(['finder'])) throw new Error('Unauthorized');

        // Set user info
        document.getElementById('user-name').textContent = getUserName();
        document.getElementById('user-avatar').textContent = getUserName().charAt(0).toUpperCase();

        // Section nav
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const section = link.dataset.section;
                document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
                document.getElementById(`section-${section}`).style.display = 'block';
                if (section === 'my-reports') loadMyReports();
            });
        });

        // Submit Found Item
        document.getElementById('found-item-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-found-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="material-icons-round">hourglass_top</i> Submitting...';

            const body = {
                type: 'found',
                title: document.getElementById('found-title').value,
                category: document.getElementById('found-category').value,
                color: document.getElementById('found-color').value || null,
                brand: document.getElementById('found-brand').value || null,
                location_found: document.getElementById('found-location').value || null,
                description: document.getElementById('found-description').value || null,
            };

            const res = await apiFetch('/api/items/', { method: 'POST', body: JSON.stringify(body) });
            const data = await res.json();

            if (res.ok) {
                showToast('Item logged successfully!');
                e.target.reset();
            } else {
                showToast(data.detail || 'Failed to log item.', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="material-icons-round">inventory</i> Log Item';
        });

        // Load My Reports
        async function loadMyReports() {
            const res = await apiFetch('/api/items/');
            const data = await res.json();
            const grid = document.getElementById('my-reports-grid');

            // Filter to only items reported by this user (found type)
            const items = data.items || [];

            if (items.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="material-icons-round">inventory_2</i><h3>No items logged yet</h3><p>Log a found item to see it here.</p></div>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-card-header">
                        <h3>${item.title}</h3>
                        ${statusBadge(item.status)}
                    </div>
                    <div class="item-card-meta">
                        <span class="meta-tag"><i class="material-icons-round">category</i>${item.category}</span>
                        ${item.color ? `<span class="meta-tag"><i class="material-icons-round">palette</i>${item.color}</span>` : ''}
                        ${item.location_found ? `<span class="meta-tag"><i class="material-icons-round">location_on</i>${item.location_found}</span>` : ''}
                    </div>
                    <p class="description">${item.description || 'No description.'}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
